services:
  - type: web
    name: uav-mission-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MODEL_BACKEND
        value: mock
      - key: CORS_ORIGINS
        sync: false
